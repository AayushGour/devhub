<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <!-- Radial gradient for background glow -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%"   stop-color="#1a2744" />
      <stop offset="100%" stop-color="#0d1117" />
    </radialGradient>

    <!-- Linear gradient for accent bar -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#58a6ff" />
      <stop offset="50%"  stop-color="#bc8cff" />
      <stop offset="100%" stop-color="#3fb950" />
    </linearGradient>

    <!-- Drop shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.5" />
    </filter>

    <!-- Glow filter for nodes -->
    <filter id="nodeGlow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Clip path -->
    <clipPath id="cardClip">
      <rect x="50" y="50" width="700" height="400" rx="16" />
    </clipPath>

    <!-- Arrow marker -->
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 Z" fill="#30363d" />
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 Z" fill="#58a6ff" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGlow)" />

  <!-- Card -->
  <rect x="50" y="50" width="700" height="400" rx="16" fill="#161b22" stroke="#30363d" stroke-width="1.5" filter="url(#shadow)" />

  <!-- Accent bar at top of card -->
  <rect x="50" y="50" width="700" height="4" rx="2" fill="url(#accentGrad)" clip-path="url(#cardClip)" />

  <!-- Title -->
  <text x="400" y="100" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#e6edf3">DevHub Preview Pipeline</text>
  <text x="400" y="122" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="12" fill="#8b949e">How the extension transforms source files into live previews</text>

  <!-- Step nodes -->
  <!-- Node 1: Source File -->
  <g transform="translate(100,190)">
    <rect x="-55" y="-28" width="110" height="56" rx="10" fill="#1c2128" stroke="#30363d" stroke-width="1.5" filter="url(#nodeGlow)" />
    <text x="0" y="-8" text-anchor="middle" font-family="monospace" font-size="11" fill="#8b949e">FILE</text>
    <text x="0" y="10" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#e6edf3">Source</text>
  </g>

  <!-- Node 2: Extension Host -->
  <g transform="translate(270,190)">
    <rect x="-60" y="-28" width="120" height="56" rx="10" fill="#1c2128" stroke="#58a6ff" stroke-width="1.5" filter="url(#nodeGlow)" />
    <text x="0" y="-8" text-anchor="middle" font-family="monospace" font-size="11" fill="#58a6ff">HOST</text>
    <text x="0" y="10" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#e6edf3">Extension</text>
  </g>

  <!-- Node 3: Webview -->
  <g transform="translate(450,190)">
    <rect x="-60" y="-28" width="120" height="56" rx="10" fill="#1c2128" stroke="#bc8cff" stroke-width="1.5" filter="url(#nodeGlow)" />
    <text x="0" y="-8" text-anchor="middle" font-family="monospace" font-size="11" fill="#bc8cff">REACT</text>
    <text x="0" y="10" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#e6edf3">Webview</text>
  </g>

  <!-- Node 4: Preview -->
  <g transform="translate(640,190)">
    <rect x="-55" y="-28" width="110" height="56" rx="10" fill="#1c2128" stroke="#3fb950" stroke-width="1.5" filter="url(#nodeGlow)" />
    <text x="0" y="-8" text-anchor="middle" font-family="monospace" font-size="11" fill="#3fb950">OUTPUT</text>
    <text x="0" y="10" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#e6edf3">Preview</text>
  </g>

  <!-- Arrows between nodes -->
  <line x1="155" y1="190" x2="205" y2="190" stroke="#30363d" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="330" y1="190" x2="385" y2="190" stroke="#58a6ff" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowBlue)" />
  <line x1="510" y1="190" x2="580" y2="190" stroke="#30363d" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Labels on arrows -->
  <text x="180" y="180" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#8b949e">onEdit</text>
  <text x="357" y="180" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#58a6ff">postMessage</text>
  <text x="545" y="180" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#8b949e">render</text>

  <!-- Supported formats list -->
  <text x="400" y="280" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="12" fill="#8b949e">Supported formats</text>
  <g font-family="monospace" font-size="11">
    <rect x="95"  y="295" width="70"  height="22" rx="4" fill="#161b22" stroke="#30363d" />
    <text x="130" y="311" text-anchor="middle" fill="#58a6ff">.md</text>

    <rect x="175" y="295" width="70"  height="22" rx="4" fill="#161b22" stroke="#30363d" />
    <text x="210" y="311" text-anchor="middle" fill="#3fb950">.json</text>

    <rect x="255" y="295" width="70"  height="22" rx="4" fill="#161b22" stroke="#30363d" />
    <text x="290" y="311" text-anchor="middle" fill="#d29922">.yaml</text>

    <rect x="335" y="295" width="70"  height="22" rx="4" fill="#161b22" stroke="#30363d" />
    <text x="370" y="311" text-anchor="middle" fill="#bc8cff">.toml</text>

    <rect x="415" y="295" width="70"  height="22" rx="4" fill="#161b22" stroke="#30363d" />
    <text x="450" y="311" text-anchor="middle" fill="#f85149">.svg</text>

    <rect x="495" y="295" width="70"  height="22" rx="4" fill="#161b22" stroke="#30363d" />
    <text x="530" y="311" text-anchor="middle" fill="#e6edf3">.xml</text>

    <rect x="575" y="295" width="70"  height="22" rx="4" fill="#161b22" stroke="#30363d" />
    <text x="610" y="311" text-anchor="middle" fill="#58a6ff">.mmd</text>

    <rect x="655" y="295" width="70"  height="22" rx="4" fill="#161b22" stroke="#30363d" />
    <text x="690" y="311" text-anchor="middle" fill="#8b949e">.html</text>
  </g>

  <!-- Circle decorations (background) -->
  <circle cx="760" cy="440" r="80" fill="none" stroke="#30363d" stroke-width="0.5" opacity="0.4" />
  <circle cx="760" cy="440" r="120" fill="none" stroke="#30363d" stroke-width="0.5" opacity="0.2" />
  <circle cx="40"  cy="60"  r="60" fill="none" stroke="#30363d" stroke-width="0.5" opacity="0.3" />

  <!-- Footer -->
  <text x="400" y="430" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" fill="#484f58">DevHub v0.0.8 — VSCode Extension</text>
</svg>
