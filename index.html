<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon" href="/logo.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Devhub | One place for all your developer tools</title>
  <script>
    // Clean up the coi-serviceworker shipped by an earlier build. It forced
    // cross-origin isolation (multi-threaded WASM), which made large CPU models
    // fail with std::bad_alloc. A registered service worker outlives its source
    // file, so unregister it explicitly. The app uses no other service workers.
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (rs) {
        rs.forEach(function (r) { r.unregister(); });
      });
    }
  </script>
  <script>
    (function() {
      var p = window.location.search.slice(1).split('&').filter(function(s) { return s.startsWith('p='); })[0];
      if (p) {
        var path = decodeURIComponent(p.slice(2));
        var base = window.location.pathname.replace(/\/$/, '');
        window.history.replaceState(null, null, base + path);
      }
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
